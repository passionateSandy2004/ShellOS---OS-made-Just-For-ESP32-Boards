name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Step 1: Build firmware for each board target ──────────────────────────
  firmware:
    name: Firmware (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32
            board: esp32-cam
          - target: esp32c6
            board: esp32-c6

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch Lua 5.4 source
        run: python3 tools/get_lua.py

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: ${{ matrix.target }}
          path: "."
          command: idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/esp32_shell_os.bin
          retention-days: 7

  # ── Step 2: Build the Windows GUI imager exe ──────────────────────────────
  imager:
    name: ShellOS Imager (Windows exe)
    runs-on: windows-latest
    needs: firmware

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install imager dependencies
        working-directory: imager
        run: pip install pyinstaller pyqt6 pyserial esptool

      - name: Download esp32-cam firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-esp32-cam
          path: imager/firmware/esp32-cam

      - name: Download esp32-c6 firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-esp32-c6
          path: imager/firmware/esp32-c6

      - name: Verify firmware files
        working-directory: imager
        shell: pwsh
        run: |
          $required = @(
            "firmware/esp32-cam/bootloader.bin",
            "firmware/esp32-cam/partition-table.bin",
            "firmware/esp32-cam/esp32_shell_os.bin",
            "firmware/esp32-c6/bootloader.bin",
            "firmware/esp32-c6/partition-table.bin",
            "firmware/esp32-c6/esp32_shell_os.bin"
          )
          foreach ($f in $required) {
            if (-not (Test-Path $f)) { Write-Error "Missing: $f"; exit 1 }
            Write-Host "OK: $f ($('{0:N0}' -f (Get-Item $f).Length) bytes)"
          }

      - name: Build exe with PyInstaller
        working-directory: imager
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name ShellOSImager `
            --add-data "firmware;firmware" `
            --hidden-import serial.tools.list_ports `
            --collect-submodules esptool `
            shellos_imager.py

      - name: Upload imager exe
        uses: actions/upload-artifact@v4
        with:
          name: ShellOSImager-windows
          path: imager/dist/ShellOSImager.exe
          retention-days: 30

  # ── Step 3: Create GitHub release on version tags ─────────────────────────
  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: imager
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package firmware ZIPs
        run: |
          cd artifacts
          for board in firmware-esp32-cam firmware-esp32-c6; do
            (cd "$board" && zip -r "../../${board}.zip" .)
          done
          ls -la ../*.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ShellOSImager-windows/ShellOSImager.exe
            firmware-esp32-cam.zip
            firmware-esp32-c6.zip
